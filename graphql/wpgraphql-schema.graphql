  """The ID of the post object the comment is replying to."""
  commentOn: Int
  """Content of the comment."""
  content: String
  """The date of the object. Preferable to enter as year/month/day ( e.g. 01/31/2021 ) as it is formatted to make the query more exact."""
  date: String
  """The approval status of the comment."""
  status: CommentStatusEnum
  """The ID of the user the comment is written for."""
  author: String
  """The email of the user the comment is written for."""
  authorEmail: String
  """The url of the user the comment is written for."""
  authorUrl: String
  """The ID of the parent object."""
  parent: ID
}

