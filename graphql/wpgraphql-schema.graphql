# ─── Arguments for user filtering ─────────────────────────────────────────────

input UsersConnectionWhereArgs {
  """Array of userIds to exclude."""
  exclude: [Int]
  """Pass an array of post types to filter results to users who have published posts in those post types."""
  hasPublishedPosts: [ContentTypeEnum]
  """Array of userIds to include."""
  include: [Int]
  """The user login."""
  login: String
  """An array of logins to include. Users matching one of these logins will be included in results."""
  loginIn: [String]
  """An array of logins to exclude. Users matching one of these logins will not be included in results."""
  loginNotIn: [String]
  """The user nicename."""
  nicename: String
  """An array of nicenames to include. Users matching one of these nicenames will be included in results."""
  nicenameIn: [String]
  """An array of nicenames to exclude. Users matching one of these nicenames will not be included in results."""
  nicenameNotIn: [String]
  """What paramater to use to order the objects by."""
  orderby: [UsersConnectionOrderbyInput]
  """An array of role names that users must match to be included in results. Note that this is an inclusive list: users must match *each* role."""
  role: UserRoleEnum
  """An array of role names. Matched users must have at least one of these roles."""
  roleIn: [UserRoleEnum]
  """An array of role names to exclude. Users matching one or more of these roles will not be included in results."""
  roleNotIn: [UserRoleEnum]
  """Search keyword. Searches for possible string matches on columns. When "searchColumns" is left empty, it tries to determine which column to search in based on search string."""
  search: String
  """Array of column names to be searched. Accepts 'ID', 'login', 'nicename', 'email', 'url'."""
  searchColumns: [UsersConnectionSearchColumnEnum]
}

"""User role enum for filtering users by role."""
enum UserRoleEnum {
  ADMINISTRATOR
  AUTHOR
  CONTRIBUTOR
  EDITOR
  SUBSCRIBER
}

"""Arguments for filtering comment connections."""
input RootQueryToCommentConnectionWhereArgs {
