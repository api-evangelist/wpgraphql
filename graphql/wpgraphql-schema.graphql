"""Input for date components in boundary queries."""
input DateInput {
  """4 digit year (e.g. 2024)."""
  year: Int
  """Month number (from 1 to 12)."""
  month: Int
  """Day of the month (from 1 to 31)."""
  day: Int
}

"""Filter results by a date range."""
input DateQueryInput {
  """4 digit year (e.g. 2024)."""
  year: Int
  """Month number (from 1 to 12)."""
  month: Int
  """Week of the year (from 0 to 53)."""
  week: Int
  """Day of the month (from 1 to 31)."""
  day: Int
  """Hour (from 0 to 23)."""
  hour: Int
  """Minute (from 0 to 59)."""
  minute: Int
  """Second (0 to 59)."""
  second: Int
  """Return nodes after this date."""
  after: DateInput
  """Return nodes before this date."""
  before: DateInput
  """For after/before, whether exact value should be matched or not."""
  inclusive: Boolean
  """Column to query against."""
  column: PostObjectsConnectionDateColumnEnum
  """Relationship to other date query arrays."""
  relation: RelationEnum
}

