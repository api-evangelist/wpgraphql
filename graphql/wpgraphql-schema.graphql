  """Array of IDs of users whose unapproved comments will be returned."""
  commentNotIn: [ID]
  """Include comments of a given type."""
  commentType: String
  """Include comments from a given array of comment types."""
  commentTypeIn: [String]
  """Exclude comments from a given array of comment types."""
  commentTypeNotIn: String
  """Content object ID to limit results by."""
  contentId: ID
  """Array of content object IDs to include affiliated comments for."""
  contentIdIn: [ID]
  """Array of content object IDs to exclude affiliated comments for."""
  contentIdNotIn: [ID]
  """Content object name (i.e. slug) to retrieve affiliated comments for."""
  contentName: String
  """Content Object parent ID to retrieve affiliated comments for."""
  contentParent: Int
  """Array of content object statuses to retrieve affiliated comments for."""
  contentStatus: [PostStatusEnum]
  """Content object type or array of types to retrieve affiliated comments for."""
  contentType: [ContentTypeEnum]
  """Array of IDs or email addresses of users whose unapproved comments will be returned."""
  includeUnapproved: [ID]
  """Karma score to retrieve matching comments for."""
  karma: Int
  """The cardinality of the order of the connection."""
  order: OrderEnum
  """Field to order the comments by."""
  orderby: CommentsConnectionOrderbyEnum
  """Parent ID of comment to retrieve children of."""
  parent: Int
  """Array of parent IDs of comments to retrieve children for."""
  parentIn: [ID]
  """Array of parent IDs of comments *not* to retrieve children for."""
  parentNotIn: [ID]
  """Search term(s) to retrieve matching comments for."""
  search: String
  """Comment status to limit results by."""
  status: String
  """Include comments for a specific user ID."""
  userId: ID
}

