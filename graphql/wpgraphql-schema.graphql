"""
WPGraphQL SDL Schema
Derived from source: https://github.com/wp-graphql/wp-graphql (plugins/wp-graphql/src/Type/)
Version: canonical schema for WPGraphQL plugin (Automattic/Jason Bahl)
Endpoint: https://example.com/graphql (host-specific)

WPGraphQL exposes WordPress data — posts, pages, users, comments, menus, taxonomies,
media, plugins, themes, and settings — as a Relay-compliant GraphQL API with
cursor-based pagination over all connections.
"""

# ─── Scalars ──────────────────────────────────────────────────────────────────

"""The `Upload` scalar type represents a file upload."""
scalar Upload

# ─── Interfaces ───────────────────────────────────────────────────────────────

"""
An object with a globally unique `ID`.
Follows the Relay Node interface specification.
"""
interface Node {
  """The globally unique ID for the object."""
  id: ID!
}

"""
Objects that can be identified by a URI.
"""
interface UniformResourceIdentifiable {
  """The globally unique ID for the object."""
  id: ID!
  """The URI for the object."""
  uri: String
  """The unique resource identifier path."""
  link: String
  """Whether the node is a Content Node."""
  isContentNode: Boolean!
  """Whether the node is a Term Node."""
  isTermNode: Boolean!
}

"""
Object that exposes its database primary key.
"""
interface DatabaseIdentifier {
  """The unique identifier stored in the database."""
  databaseId: Int!
}

"""
A node that can have comments associated with it.
"""
interface NodeWithComments {
  """The number of comments. Even though WPGraphQL denotes this field as an integer, in WordPress, this field should be saved as a numeric string for backward compatibility."""
  commentCount: Int
  """Whether the comments are open or closed for this particular post."""
  commentStatus: String
}

"""
A node that can have an author assigned to it.
"""
interface NodeWithAuthor {
  """Connection between the NodeWithAuthor type and the User type."""
  author: NodeWithAuthorToUserConnectionEdge
  """The database identifier of the author of the node."""
  authorDatabaseId: Int
  """The globally unique identifier of the author of the node."""
  authorId: ID
}

"""
A node that can have a featured image set.
"""
interface NodeWithFeaturedImage {
  """Connection between the NodeWithFeaturedImage type and the MediaItem type."""
  featuredImage: NodeWithFeaturedImageToMediaItemConnectionEdge
  """The database identifier of the featured image."""
  featuredImageDatabaseId: Int
  """Globally unique ID of the featured image."""
  featuredImageId: ID
}

"""
A node with a title.
"""
interface NodeWithTitle {
  """The title of the post. This is currently just the raw title. An amendment to support rendered title needs to be investigated."""
  title(format: PostObjectFieldFormatEnum): String
}

"""
A node with an excerpt.
"""
interface NodeWithExcerpt {
  """The excerpt of the post."""
  excerpt(format: PostObjectFieldFormatEnum): String
}

"""
A node with content editor data.
"""
interface NodeWithContentEditor {
  """The content of the post."""
  content(format: PostObjectFieldFormatEnum): String
}

"""
A node that can have page attributes (menu order and page template).
"""
interface NodeWithPageAttributes {
  """A field used for ordering posts. This is typically used with nav menu items or for special ordering of hierarchical content types."""
  menuOrder: Int
}

"""
A node that supports revisions.
"""
interface NodeWithRevisions {
  """True if the node is a revision of another node."""
  isRevision: Boolean
}

"""
A node that can have trackbacks and pingbacks.
"""
interface NodeWithTrackbacks {
  """URLs that have been pinged."""
  pinged: [String]
  """URLs queued to be pinged."""
  toPing: [String]
  """Whether the pings are open or closed for this particular post."""
  pingStatus: String
}

"""
A node that can be previewed.
"""
interface Previewable {
  """Whether the object is a node in the preview state."""
  isPreview: Boolean
  """The preview version of this node."""
  preview: PreviewableToPreviewConnectionEdge
}

"""
Content nodes that are hierarchical.
"""
interface HierarchicalContentNode {
  """Database id of the parent node."""
  parentDatabaseId: Int
  """The globally unique identifier of the parent node."""
  parentId: ID
}

"""
Hierarchical term nodes.
"""
interface HierarchicalTermNode {
  """Database id of the parent node."""
  parentDatabaseId: Int
  """The globally unique identifier of the parent node."""
  parentId: ID
}

"""
A hierarchical node.
"""
interface HierarchicalNode {
  """Database id of the parent node."""
  parentDatabaseId: Int
  """The globally unique identifier of the parent node."""
  parentId: ID
}

"""
A comment author.
"""
interface Commenter {
  """Identifies the primary key from the database."""
  databaseId: Int!
  """The email for the comment author."""
  email: String
  """The globally unique identifier for the comment author."""
  id: ID!
  """Whether the author information is considered restricted."""
  isRestricted: Boolean
  """The name of the author."""
  name: String
  """The URL of the author's website."""
  url: String
}

"""
A menu item linkable target.
"""
interface MenuItemLinkable {
  """The globally unique ID for the object."""
  id: ID!
  """The database ID of the node."""
  databaseId: Int!
  """The URI for the node."""
  uri: String
  """Whether the node is a Content Node."""
  isContentNode: Boolean!
  """Whether the node is a Term Node."""
  isTermNode: Boolean!
}

"""
A term node (category, tag, or other taxonomy term).
"""
interface TermNode {
  """The globally unique ID for the object."""
  id: ID!
  """The number of objects connected to the object."""
  count: Int
  """The database id of the object."""
  databaseId: Int!
  """The description of the object."""
  description: String
  """Url to the object."""
  link: String
  """The human friendly name of the object."""
  name: String
  """An alphanumeric identifier for the object unique to its type."""
  slug: String
  """The name of the taxonomy that the object is associated with."""
  taxonomyName: String
  """The ID of the term group that this term object belongs to."""
  termGroupId: Int
  """The taxonomy ID that the object is associated with."""
  termTaxonomyId: Int
  """The unique resource identifier path."""
  uri: String
}

"""
A WordPress content node.
"""
interface ContentNode {
  """The globally unique ID for the object."""
  id: ID!
  """The locally unique ID for the object within its post type."""
  databaseId: Int!
  """Post publishing date."""
  date: String
  """The publishing date set in GMT."""
  dateGmt: String
  """The desired slug of the post."""
  desiredSlug: String
  """If a user has edited the node within the past 15 seconds, this will return the user that last edited. Null if the edit lock doesn't exist or is greater than 15 seconds."""
  editingLockedBy: ContentNodeToEditLockConnectionEdge
  """The RSS enclosure for the object."""
  enclosure: String
  """The global unique identifier for this post. This currently matches the value stored in WP_Post->guid and the guid column in the "post_objects" database table."""
  guid: String
  """The globally unique identifier of the node."""
  id: ID!
  """Whether the object is a node in the preview state."""
  isPreview: Boolean
  """Whether the object is restricted from the current viewer."""
  isRestricted: Boolean
  """The permalink of the post."""
  link: String
  """The local modified time for a post. If a post was recently updated the modified field will change to match the corresponding time."""
  modified: String
  """The GMT modified time for a post. If a post was recently updated the modified field will change to match the corresponding time in GMT."""
  modifiedGmt: String
  """The database id of the preview node."""
  previewRevisionDatabaseId: Int
  """Whether the object is a revision."""
  previewRevisionId: ID
  """The uri slug for the post. This is equivalent to the WP_Post->post_name field and the post_name column in the database for the "post_objects" table."""
  slug: String
  """The current status of the object."""
  status: String
  """The template assigned to a node of content."""
  template: ContentTemplate
  """The unique resource identifier path."""
  uri: String
}

"""
A content template.
"""
interface ContentTemplate {
  """The name of the template."""
  templateName: String
}

"""
An enqueued asset (script or stylesheet).
"""
interface EnqueuedAsset {
  """Dependencies needed to use this asset."""
  dependencies: [EnqueuedScript]
  """Extra information needed for the script."""
  extra: String
  """The handle of the enqueued asset."""
  handle: String
  """The ID of the enqueued asset."""
  id: ID!
  """The source of the asset."""
  src: String
  """The version of the enqueued asset."""
  version: String
}

# ─── Enums ────────────────────────────────────────────────────────────────────

"""Sort direction for ordered results."""
enum OrderEnum {
  """Results ordered from lowest to highest values (A-Z, oldest-newest)."""
  ASC
  """Results ordered from highest to lowest values (Z-A, newest-oldest)."""
  DESC
}

"""Logical operator for combining multiple query conditions."""
enum RelationEnum {
  """All conditions must match (more restrictive filtering)."""
  AND
  """Any condition can match (more inclusive filtering)."""
  OR
}

"""Format of field output."""
enum PostObjectFieldFormatEnum {
  """Applies the default WordPress kses filters."""
  RENDERED
  """Applies no additional filters."""
  RAW
}

"""The status of a post object."""
enum PostStatusEnum {
  """Content publicly visible to all visitors."""
  PUBLISH
  """Content saved but not yet published."""
  DRAFT
  """Content awaiting review before publication."""
  PENDING
  """Content visible to authorized users only."""
  PRIVATE
  """Content moved to trash."""
  TRASH
  """Scheduled content not yet published."""
  FUTURE
  """Content that is auto-draft."""
  AUTO_DRAFT
  """Content that inherits status from its parent."""
  INHERIT
}

"""The type of idType to identify a comment node."""
enum CommentNodeIdTypeEnum {
  """Identify a resource by the Database ID."""
  DATABASE_ID
  """Identify a resource by the (hashed) Global ID."""
  ID
}

"""The status of a comment object."""
enum CommentStatusEnum {
  """Comments with approved status."""
  APPROVE
  """Comments with hold status."""
  HOLD
  """Comments with spam status."""
  SPAM
  """Comments with trash status."""
  TRASH
}

"""The type of idType to identify a user node."""
enum UserNodeIdTypeEnum {
  """Identify a resource by the Database ID."""
  DATABASE_ID
  """Identify a resource by email address."""
  EMAIL
  """Identify a resource by the (hashed) Global ID."""
  ID
  """Identify a resource by the slug."""
  SLUG
  """Identify a resource by the URI."""
  URI
  """Identify a user by their username (login)."""
  USERNAME
}

